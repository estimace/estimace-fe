stages:
  - test

linter:
  stage: test
  image: node:20-alpine
  script:
    - yarn --frozen-lockfile
    - yarn run lint

types check:
  stage: test
  image: node:20-alpine
  script:
    - yarn --frozen-lockfile
    - yarn run tsc

integration tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.55.1-jammy
  script:
    - yarn --frozen-lockfile
    - npx playwright install chromium --with-deps
    - yarn run test:integration
